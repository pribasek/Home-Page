<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LSPD - Výběr formuláře</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Roboto', sans-serif;
      background-color: #0e1a2b;
      color: #ffffff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      background-color: #1f2f4a;
      padding: 40px;
      border-radius: 16px;
      border: 2px solid #f1c40f;
    }

    h1 {
      color: #f1c40f;
      margin-bottom: 30px;
    }

    .button {
      display: inline-block;
      background-color: #f1c40f;
      color: #0e1a2b;
      padding: 15px 30px;
      margin: 10px;
      font-size: 18px;
      font-weight: bold;
      text-decoration: none;
      border-radius: 10px;
      transition: background-color 0.2s;
    }

    .button:hover {
      background-color: #d4ac0d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Vyberte typ hlášení</h1>
    <a href="https://pribasek.github.io/pomocnik/" class="button">Incident Report</a>
    <a href="https://pribasek.github.io/traffic-stops/" class="button">Traffic Stop</a>
  </div>
</body>
</html>
